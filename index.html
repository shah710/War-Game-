<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>War Game Beta v0.1</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --blue1: #2f7de1;
      --blue2: #64b5ff;
      --red1: #c62828;
      --red2: #ff6b6b;
      --bg1: #1d3557;
      --bg2: #0b1320;
      --bg3: #05080f;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.12);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    body.shake { animation: screenShake 0.35s linear; }

    @keyframes screenShake {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-6px, 3px); }
      40% { transform: translate(6px, -2px); }
      60% { transform: translate(-4px, -3px); }
      80% { transform: translate(4px, 2px); }
      100% { transform: translate(0, 0); }
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 { margin-bottom: 8px; }

    .beta {
      display: inline-block;
      background: #ffd166;
      color: #111;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .subtitle {
      color: #d7e3f4;
      margin-bottom: 18px;
    }

    .start-panel, .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .start-panel {
      max-width: 620px;
      margin: 0 auto 22px;
      padding: 18px;
    }

    .start-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    input {
      min-width: 260px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 16px;
      outline: none;
    }

    input::placeholder { color: #c8d4e4; }

    .hud {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 18px;
    }

    .panel { padding: 14px; }

    .country-name {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .blue-text { color: #7fc2ff; }
    .red-text { color: #ff8d8d; }

    .bar-wrap {
      background: rgba(255,255,255,0.12);
      height: 26px;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .bar {
      height: 100%;
      width: 100%;
      transition: width 0.45s ease;
    }

    .bar.blue { background: linear-gradient(90deg, var(--blue1), var(--blue2)); }
    .bar.red { background: linear-gradient(90deg, var(--red1), var(--red2)); }

    .stats {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 15px;
      color: #d8e1ea;
    }

    .map {
      position: relative;
      height: 460px;
      margin: 22px 0;
      border-radius: 22px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 20%),
        radial-gradient(circle at 75% 30%, rgba(255,255,255,0.04), transparent 18%),
        radial-gradient(circle at 60% 70%, rgba(255,255,255,0.04), transparent 16%),
        linear-gradient(180deg, #16324f 0%, #0d2238 100%);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 14px 30px rgba(0,0,0,0.3);
    }

    .grid-lines::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(to right, transparent 0, transparent 59px, rgba(255,255,255,0.05) 60px),
        repeating-linear-gradient(to bottom, transparent 0, transparent 59px, rgba(255,255,255,0.05) 60px);
      opacity: 0.35;
    }

    .stars {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 16%, rgba(255,255,255,0.7) 0 1px, transparent 2px),
        radial-gradient(circle at 22% 8%, rgba(255,255,255,0.45) 0 1px, transparent 2px),
        radial-gradient(circle at 37% 12%, rgba(255,255,255,0.5) 0 1px, transparent 2px),
        radial-gradient(circle at 52% 18%, rgba(255,255,255,0.4) 0 1px, transparent 2px),
        radial-gradient(circle at 66% 10%, rgba(255,255,255,0.55) 0 1px, transparent 2px),
        radial-gradient(circle at 79% 15%, rgba(255,255,255,0.5) 0 1px, transparent 2px),
        radial-gradient(circle at 88% 9%, rgba(255,255,255,0.6) 0 1px, transparent 2px);
      opacity: 0.55;
      pointer-events: none;
    }

    .land {
      position: absolute;
      background: #446f47;
      opacity: 0.95;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.25));
    }

    .land1 {
      width: 280px;
      height: 180px;
      left: 80px;
      top: 145px;
      clip-path: polygon(5% 28%, 22% 8%, 52% 4%, 80% 16%, 94% 44%, 89% 75%, 70% 96%, 36% 92%, 14% 78%, 0% 54%);
    }

    .land2 {
      width: 300px;
      height: 190px;
      right: 65px;
      top: 135px;
      clip-path: polygon(8% 20%, 30% 4%, 74% 10%, 96% 36%, 100% 70%, 79% 92%, 46% 96%, 18% 86%, 2% 58%);
    }

    .country {
      position: absolute;
      width: 220px;
      height: 150px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.25);
      box-shadow: inset 0 0 30px rgba(255,255,255,0.07), 0 10px 20px rgba(0,0,0,0.25);
      z-index: 2;
      overflow: hidden;
      word-break: break-word;
    }

    .country.a {
      left: 110px;
      top: 155px;
      background: linear-gradient(135deg, rgba(47,125,225,0.95), rgba(30,80,160,0.95));
    }

    .country.b {
      right: 100px;
      top: 150px;
      background: linear-gradient(135deg, rgba(198,40,40,0.95), rgba(120,15,15,0.95));
    }

    .capital {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 18px rgba(255,255,255,0.75);
      z-index: 3;
    }

    .capital.a {
      left: 285px;
      top: 230px;
      background: #8ecaff;
    }

    .capital.b {
      right: 260px;
      top: 225px;
      background: #ffb0b0;
    }

    .label {
      position: absolute;
      font-size: 14px;
      color: #eef6ff;
      z-index: 3;
    }

    .label.a {
      left: 310px;
      top: 226px;
    }

    .label.b {
      right: 145px;
      top: 221px;
    }

    .missile {
      position: absolute;
      border-radius: 999px;
      z-index: 5;
      opacity: 0;
      transform-origin: center;
      box-shadow: 0 0 12px rgba(255,255,255,0.85);
    }

    .missile.missile-attack {
      width: 18px;
      height: 8px;
      background: linear-gradient(90deg, #ffffff, #ffdd57);
    }

    .missile.ballistic-attack {
      width: 28px;
      height: 10px;
      background: linear-gradient(90deg, #ffffff, #b388ff);
      box-shadow: 0 0 16px rgba(179,136,255,0.9);
    }

    .missile.nuclear-attack {
      width: 38px;
      height: 13px;
      background: linear-gradient(90deg, #ffffff, #ff6b6b);
      box-shadow: 0 0 20px rgba(255,120,120,0.95);
    }

    .trail {
      position: absolute;
      height: 2px;
      background: rgba(255,255,255,0.6);
      z-index: 4;
      opacity: 0;
      transform-origin: left center;
    }

    .explosion {
      position: absolute;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 6;
      transform: translate(-50%, -50%) scale(0.2);
      --scale: 1.6;
    }

    .explosion.missile-explosion {
      background: radial-gradient(circle, #fff7b1 0%, #ffb703 35%, #fb8500 65%, rgba(255,115,0,0.15) 100%);
    }

    .explosion.ballistic-explosion {
      background: radial-gradient(circle, #ffffff 0%, #ffd166 25%, #ff7b00 55%, #d62828 80%, rgba(214,40,40,0.22) 100%);
    }

    .explosion.nuclear-explosion {
      background: radial-gradient(circle, #ffffff 0%, #fff3b0 18%, #ffb703 35%, #fb5607 58%, #d00000 78%, rgba(208,0,0,0.26) 100%);
      box-shadow: 0 0 34px rgba(255,140,0,0.75);
    }

    .cloud {
      position: absolute;
      pointer-events: none;
      z-index: 7;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.3);
      filter: blur(0.4px);
    }

    .cloud.nuclear-cloud .cap,
    .cloud.nuclear-cloud .stem {
      position: absolute;
      background: radial-gradient(circle, rgba(255,244,200,0.95) 0%, rgba(255,161,60,0.85) 45%, rgba(170,45,20,0.45) 100%);
      border-radius: 50%;
    }

    .cloud.nuclear-cloud .cap {
      width: 120px;
      height: 80px;
      left: -60px;
      top: -70px;
      box-shadow:
        -36px 10px 0 8px rgba(255,153,51,0.35),
        36px 10px 0 8px rgba(255,153,51,0.35),
        0 20px 0 12px rgba(255,153,51,0.28);
    }

    .cloud.nuclear-cloud .stem {
      width: 44px;
      height: 95px;
      left: -22px;
      top: -8px;
      border-radius: 40px;
      background: linear-gradient(180deg, rgba(255,200,120,0.9), rgba(180,70,30,0.45));
    }

    .impact-ring {
      position: absolute;
      border: 3px solid rgba(255,235,180,0.85);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.3);
      opacity: 0;
      z-index: 5;
      pointer-events: none;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 18px 0;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      transition: transform 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    button:hover { transform: translateY(-2px); }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-start { background: #2a9d8f; }
    .btn-missile { background: #2f7de1; }
    .btn-ballistic { background: #7b2cbf; }
    .btn-nuclear { background: #c62828; }
    .btn-restart { background: #2a9d8f; }

    .info-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin-bottom: 12px;
      color: #d8e1ea;
    }

    .status {
      font-weight: bold;
      min-height: 24px;
    }

    #log {
      margin-top: 16px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px;
      height: 240px;
      overflow-y: auto;
      text-align: left;
    }

    #log div {
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
    }

    #result {
      font-size: 30px;
      font-weight: bold;
      margin-top: 12px;
      min-height: 40px;
    }

    .hidden { display: none; }

    @keyframes fly-right {
      0% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
      100% { opacity: 1; transform: translate(565px, -6px) rotate(0deg); }
    }

    @keyframes fly-left {
      0% { opacity: 1; transform: translate(0, 0) rotate(180deg); }
      100% { opacity: 1; transform: translate(-565px, 6px) rotate(180deg); }
    }

    @keyframes trail-grow-right {
      0% { opacity: 0.75; width: 0; }
      100% { opacity: 0; width: 565px; }
    }

    @keyframes trail-grow-left {
      0% { opacity: 0.75; width: 0; }
      100% { opacity: 0; width: 565px; }
    }

    @keyframes boom {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(0.2); }
      60% { opacity: 1; transform: translate(-50%, -50%) scale(calc(var(--scale) * 1)); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(calc(var(--scale) * 1.6)); }
    }

    @keyframes ringExpand {
      0% { opacity: 0.95; transform: translate(-50%, -50%) scale(0.2); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(2.8); }
    }

    @keyframes cloudRise {
      0% { opacity: 0.05; transform: translate(-50%, -30%) scale(0.35); }
      30% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -95%) scale(1.3); }
    }

    @media (max-width: 900px) {
      .hud { grid-template-columns: 1fr; }
      .map { height: 390px; }
      .country { width: 160px; height: 120px; font-size: 20px; }
      .country.a { left: 38px; top: 160px; }
      .country.b { right: 28px; top: 155px; }
      .land1 { width: 210px; height: 145px; left: 25px; }
      .land2 { width: 220px; height: 150px; right: 18px; }
      .capital.a { left: 155px; top: 223px; }
      .capital.b { right: 145px; top: 220px; }
      .label.a { left: 180px; top: 220px; }
      .label.b { right: 28px; top: 216px; }
      input { min-width: 220px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>War Game: Custom Nation vs Computer Nation</h1>
    <div class="beta">⚠️ Trial Version — Beta v0.1</div>
    <div class="subtitle">Name your country, then battle the computer on the world map.</div>

    <div class="start-panel" id="startPanel">
      <div><b>Create your country</b></div>
      <div class="start-row">
        <input id="countryNameInput" type="text" maxlength="24" placeholder="Enter your country name" />
        <button class="btn-start" onclick="startGame()">Start Game</button>
      </div>
    </div>

    <div id="gameArea" class="hidden">
      <div class="hud">
        <div class="panel">
          <div class="country-name blue-text" id="hudNameA">Your Country</div>
          <div class="bar-wrap"><div id="barA" class="bar blue"></div></div>
          <div class="stats">
            <span>Points: <span id="scoreA">100</span></span>
            <span>Player</span>
          </div>
        </div>

        <div class="panel">
          <div class="country-name red-text" id="hudNameB">Computer Nation</div>
          <div class="bar-wrap"><div id="barB" class="bar red"></div></div>
          <div class="stats">
            <span>Points: <span id="scoreB">100</span></span>
            <span>Computer AI</span>
          </div>
        </div>
      </div>

      <div class="map grid-lines" id="map">
        <div class="stars"></div>
        <div class="land land1"></div>
        <div class="land land2"></div>

        <div class="country a" id="countryABox">Your Country</div>
        <div class="country b" id="countryBBox">Computer</div>

        <div class="capital a"></div>
        <div class="capital b"></div>

        <div class="label a" id="capitalALabel">Capital</div>
        <div class="label b">Enemy Capital</div>
      </div>

      <div class="info-row">
        <div>Round: <b id="round">1</b> / 10</div>
        <div class="status" id="status">Your turn</div>
      </div>

      <div class="controls">
        <button class="btn-missile" id="btnMissile" onclick="playerAttack('missile')">Missile</button>
        <button class="btn-ballistic" id="btnBallistic" onclick="playerAttack('ballistic')">Ballistic</button>
        <button class="btn-nuclear" id="btnNuclear" onclick="playerAttack('nuclear')">Nuclear</button>
        <button class="btn-restart" onclick="restartGame()">Restart</button>
      </div>

      <div id="result"></div>
      <div id="log"></div>
    </div>
  </div>

  <script>
    let playerCountry = "Blue Nation";
    let enemyCountry = "Red Dominion";

    let scoreA = 100;
    let scoreB = 100;
    let round = 1;
    const maxRounds = 10;
    let gameOver = false;
    let busy = false;
    let gameStarted = false;

    const attackData = {
      missile: {
        label: "Missile",
        min: 8,
        max: 15,
        explosionScale: 1.7,
        shake: 0,
        missileClass: "missile-attack",
        explosionClass: "missile-explosion",
        totalDuration: 1700
      },
      ballistic: {
        label: "Ballistic",
        min: 12,
        max: 22,
        explosionScale: 2.9,
        shake: 1,
        missileClass: "ballistic-attack",
        explosionClass: "ballistic-explosion",
        totalDuration: 2000
      },
      nuclear: {
        label: "Nuclear",
        min: 18,
        max: 35,
        explosionScale: 4.8,
        shake: 2,
        missileClass: "nuclear-attack",
        explosionClass: "nuclear-explosion",
        totalDuration: 7000,
        audioFile: "nuclear.mp3"
      }
    };

    const positions = {
      A: { x: 300, y: 238 },
      B: { x: 875, y: 232 }
    };

    let nuclearAudio = null;

    function sanitizeCountryName(name) {
      const cleaned = name.replace(/[<>]/g, "").trim();
      return cleaned.length ? cleaned : "Blue Nation";
    }

    function setupAudio() {
      nuclearAudio = new Audio(attackData.nuclear.audioFile);
      nuclearAudio.preload = "auto";
    }

    function startGame() {
      const input = document.getElementById("countryNameInput").value;
      playerCountry = sanitizeCountryName(input);
      gameStarted = true;

      document.getElementById("startPanel").classList.add("hidden");
      document.getElementById("gameArea").classList.remove("hidden");

      applyNames();
      setupAudio();
      restartGame(true);
    }

    function applyNames() {
      document.getElementById("hudNameA").textContent = playerCountry;
      document.getElementById("hudNameB").textContent = enemyCountry;
      document.getElementById("countryABox").textContent = playerCountry;
      document.getElementById("countryBBox").textContent = enemyCountry;
      document.getElementById("capitalALabel").textContent = playerCountry + " Capital";
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function logMessage(message) {
      const log = document.getElementById("log");
      const entry = document.createElement("div");
      entry.textContent = message;
      log.prepend(entry);
    }

    function updateUI() {
      document.getElementById("scoreA").textContent = scoreA;
      document.getElementById("scoreB").textContent = scoreB;
      document.getElementById("barA").style.width = scoreA + "%";
      document.getElementById("barB").style.width = scoreB + "%";
      document.getElementById("round").textContent = Math.min(round, maxRounds);
      disableAttackButtons(gameOver || busy || !gameStarted);
    }

    function disableAttackButtons(disabled) {
      document.getElementById("btnMissile").disabled = disabled;
      document.getElementById("btnBallistic").disabled = disabled;
      document.getElementById("btnNuclear").disabled = disabled;
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function calculateDamage(type, attacker) {
      const attack = attackData[type];
      let damage = rand(attack.min, attack.max);

      if (attacker === "B") damage += aiBonus(type);

      if (type === "nuclear") {
        if (attacker === "A" && scoreA < 30) damage -= 3;
        if (attacker === "B" && scoreB < 30) damage += 2;
      }

      return clamp(damage, 5, 42);
    }

    function aiChooseAttack() {
      const lead = scoreB - scoreA;

      if (scoreB <= 24) return Math.random() < 0.68 ? "nuclear" : "ballistic";
      if (scoreA <= 20) return Math.random() < 0.62 ? "missile" : "ballistic";
      if (lead < -18) return Math.random() < 0.72 ? "nuclear" : "ballistic";
      if (lead > 16) return Math.random() < 0.65 ? "missile" : "ballistic";

      const roll = Math.random();
      if (roll < 0.40) return "missile";
      if (roll < 0.76) return "ballistic";
      return "nuclear";
    }

    function aiBonus(type) {
      if (type === "missile") return rand(0, 2);
      if (type === "ballistic") return rand(1, 3);
      return rand(2, 4);
    }

    function triggerShake(level) {
      if (level <= 0) return;
      document.body.classList.remove("shake");
      void document.body.offsetWidth;
      document.body.classList.add("shake");
    }

    function playAttackSound(type) {
      if (type === "nuclear" && nuclearAudio) {
        try {
          nuclearAudio.pause();
          nuclearAudio.currentTime = 0;
          nuclearAudio.play().catch(() => {});
        } catch (e) {}
      }
    }

    function createImpactRing(map, x, y, size, duration) {
      const ring = document.createElement("div");
      ring.className = "impact-ring";
      ring.style.left = x + "px";
      ring.style.top = y + "px";
      ring.style.width = size + "px";
      ring.style.height = size + "px";
      ring.style.animation = `ringExpand ${duration}ms ease-out forwards`;
      map.appendChild(ring);
      setTimeout(() => ring.remove(), duration + 50);
    }

    function createMushroomCloud(map, x, y, duration) {
      const cloud = document.createElement("div");
      cloud.className = "cloud nuclear-cloud";
      cloud.style.left = x + "px";
      cloud.style.top = y + "px";
      cloud.innerHTML = '<div class="cap"></div><div class="stem"></div>';
      cloud.style.animation = `cloudRise ${duration}ms ease-out forwards`;
      map.appendChild(cloud);
      setTimeout(() => cloud.remove(), duration + 50);
    }

    function animateAttack(attacker, defender, type, callback) {
      const map = document.getElementById("map");
      const from = positions[attacker];
      const to = positions[defender];
      const attack = attackData[type];

      const missile = document.createElement("div");
      missile.className = "missile " + attack.missileClass;
      missile.style.left = from.x + "px";
      missile.style.top = from.y + "px";

      const trail = document.createElement("div");
      trail.className = "trail";
      trail.style.left = from.x + "px";
      trail.style.top = (from.y + 2) + "px";

      const explosion = document.createElement("div");
      explosion.className = "explosion " + attack.explosionClass;
      explosion.style.left = to.x + "px";
      explosion.style.top = to.y + "px";
      explosion.style.setProperty("--scale", attack.explosionScale);

      map.appendChild(trail);
      map.appendChild(missile);
      map.appendChild(explosion);

      const isNuclear = type === "nuclear";

      if (attacker === "A") {
        missile.style.animation = isNuclear
          ? "fly-right 3.5s linear forwards"
          : "fly-right 0.9s linear forwards";
        trail.style.animation = isNuclear
          ? "trail-grow-right 3.3s linear forwards"
          : "trail-grow-right 0.85s linear forwards";
      } else {
        missile.style.animation = isNuclear
          ? "fly-left 3.5s linear forwards"
          : "fly-left 0.9s linear forwards";
        trail.style.left = to.x + "px";
        trail.style.top = (to.y + 2) + "px";
        trail.style.transform = "rotate(180deg)";
        trail.style.animation = isNuclear
          ? "trail-grow-left 3.3s linear forwards"
          : "trail-grow-left 0.85s linear forwards";
      }

      const impactDelay = isNuclear ? 3500 : 820;
      const explosionDuration = isNuclear ? 2500 : 780;
      const ringDuration = isNuclear ? 2200 : 700;
      const cloudDuration = isNuclear ? 3200 : 1600;

      setTimeout(() => {
        playAttackSound(type);
        triggerShake(attack.shake);
        explosion.style.animation = `boom ${explosionDuration}ms ease-out forwards`;
        createImpactRing(map, to.x, to.y, isNuclear ? 120 : type === "ballistic" ? 65 : 42, ringDuration);

        if (isNuclear) {
          createMushroomCloud(map, to.x, to.y - 4, cloudDuration);
        }
      }, impactDelay);

      setTimeout(() => {
        missile.remove();
        trail.remove();
        explosion.remove();
        callback();
      }, attack.totalDuration);
    }

    function playerAttack(type) {
      if (gameOver || busy || !gameStarted) return;

      busy = true;
      updateUI();
      setStatus(type === "nuclear" ? "Launching Nuclear strike..." : "Launching " + attackData[type].label + "...");

      animateAttack("A", "B", type, () => {
        const damage = calculateDamage(type, "A");
        scoreB = Math.max(0, scoreB - damage);

        logMessage(playerCountry + " used " + attackData[type].label + " and dealt " + damage + " damage to " + enemyCountry + ".");
        updateUI();

        if (checkEnd()) {
          busy = false;
          updateUI();
          return;
        }

        setStatus(enemyCountry + " is planning a response...");
        setTimeout(aiTurn, 650);
      });
    }

    function aiTurn() {
      if (gameOver) return;

      const type = aiChooseAttack();

      animateAttack("B", "A", type, () => {
        const damage = calculateDamage(type, "B");
        scoreA = Math.max(0, scoreA - damage);

        logMessage(enemyCountry + " used " + attackData[type].label + " and dealt " + damage + " damage to " + playerCountry + ".");
        round++;
        busy = false;
        updateUI();

        if (checkEnd()) {
          updateUI();
          return;
        }

        setStatus("Your turn");
        updateUI();
      });
    }

    function checkEnd() {
      if (scoreA <= 0 || scoreB <= 0 || round > maxRounds) {
        gameOver = true;
        disableAttackButtons(true);

        let resultText = "";
        if (scoreA > scoreB) resultText = "🏆 " + playerCountry + " wins!";
        else if (scoreB > scoreA) resultText = "💀 " + enemyCountry + " wins!";
        else resultText = "🤝 Draw!";

        document.getElementById("result").textContent = resultText;
        setStatus("Game over");
        logMessage("Game Over — " + resultText);
        return true;
      }
      return false;
    }

    function restartGame(fromStart = false) {
      if (!gameStarted && !fromStart) return;

      scoreA = 100;
      scoreB = 100;
      round = 1;
      gameOver = false;
      busy = false;

      document.getElementById("result").textContent = "";
      document.getElementById("log").innerHTML = "";
      setStatus("Your turn");

      applyNames();
      updateUI();
      logMessage("New game started: " + playerCountry + " vs " + enemyCountry + ".");
    }
  </script>
</body>
</html>
