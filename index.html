<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Game</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
}

/* Beta banner */
.beta {
  background: #ffcc00;
  color: black;
  padding: 8px;
  border-radius: 6px;
  margin: 10px;
  font-weight: bold;
}

/* Countries */
.countries {
  display: flex;
  justify-content: space-around;
  margin: 30px 0;
}

.country {
  width: 40%;
}

/* Health bars */
.bar {
  height: 25px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 100%;
}

/* Colors */
.blue { background: #2196f3; }
.red { background: #e53935; }

/* Buttons */
button {
  padding: 12px 20px;
  margin: 10px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

#log {
  background: black;
  height: 200px;
  overflow-y: auto;
  margin-top: 20px;
  padding: 10px;
  text-align: left;
}
</style>
</head>

<body>

<div class="container">
  <h1>War Game: Country A vs Country B</h1>
  <div class="beta">⚠️ Trial Version — Beta v0.1</div>

  <p>You are <b style="color:#2196f3;">Country A (Blue)</b><br>
  Computer is <b style="color:#e53935;">Country B (Red)</b></p>

  <div class="countries">
    <div class="country">
      <h2 style="color:#2196f3;">Country A</h2>
      <div class="bar"><div id="barA" class="fill blue"></div></div>
      <p>Points: <span id="scoreA">100</span></p>
    </div>

    <div class="country">
      <h2 style="color:#e53935;">Country B</h2>
      <div class="bar"><div id="barB" class="fill red"></div></div>
      <p>Points: <span id="scoreB">100</span></p>
    </div>
  </div>

  <div>
    <button onclick="playerAttack('missile')">Missile</button>
    <button onclick="playerAttack('ballistic')">Ballistic</button>
    <button onclick="playerAttack('nuclear')">Nuclear</button>
  </div>

  <h3 id="round">Round 1 / 10</h3>
  <div id="log"></div>
  <h2 id="result"></h2>
</div>

<script>
let scoreA = 100;
let scoreB = 100;
let round = 1;
let maxRounds = 10;
let gameOver = false;

const attacks = {
  missile: [8,15],
  ballistic: [12,22],
  nuclear: [18,35]
};

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function updateBars(){
  document.getElementById("scoreA").textContent = scoreA;
  document.getElementById("scoreB").textContent = scoreB;

  document.getElementById("barA").style.width = scoreA + "%";
  document.getElementById("barB").style.width = scoreB + "%";

  document.getElementById("round").textContent =
    "Round " + round + " / 10";
}

function log(msg){
  let div = document.createElement("div");
  div.textContent = msg;
  document.getElementById("log").prepend(div);
}

function playerAttack(type){
  if(gameOver) return;

  let dmg = rand(...attacks[type]);
  scoreB -= dmg;
  if(scoreB < 0) scoreB = 0;

  log("You used " + type + " → -" + dmg + " to Country B");

  updateBars();

  if(checkEnd()) return;

  setTimeout(aiTurn, 800);
}

function aiTurn(){
  let types = ["missile","ballistic","nuclear"];
  let type = types[Math.floor(Math.random()*3)];

  let dmg = rand(...attacks[type]);
  scoreA -= dmg;
  if(scoreA < 0) scoreA = 0;

  log("Computer used " + type + " → -" + dmg + " to YOU");

  round++;
  updateBars();

  checkEnd();
}

function checkEnd(){
  if(round > maxRounds || scoreA <= 0 || scoreB <= 0){
    gameOver = true;

    let result = "";
    if(scoreA > scoreB) result = "🏆 YOU WIN!";
    else if(scoreB > scoreA) result = "💀 COMPUTER WINS!";
    else result = "🤝 DRAW";

    document.getElementById("result").textContent = result;
    return true;
  }
  return false;
}

updateBars();
log("Game started.");
</script>

</body>
</html>
